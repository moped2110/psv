version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-ci:
        patterns: ["*"]
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      ci-actions:
        patterns: ["*"]
    open-pull-requests-limit: 2
