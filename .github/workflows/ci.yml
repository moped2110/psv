name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lock:
    name: Reproducible dependency lock
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install hash-locked CI environment
        run: python -m pip install --require-hashes -r requirements/ci.txt
      - name: Verify the lock matches its inputs
        run: |
          # Regenerate and diff. Without this guard a lock can silently drift from
          # requirements/ci.in — which is how the missing `editables` entry and the
          # 3.12-only resolution reached main and broke every job on 2026-07-18.
          #
          # --python-version pins the resolution floor to the lowest version in the
          # test matrix below. Dropping it omits dependencies that only apply under
          # 3.12 (jaraco-context -> backports-tarfile) and --require-hashes then
          # fails on 3.11. The flags must match requirements/ci.in's header comment
          # exactly, because uv records the invocation in the generated file.
          uv pip compile --universal --python-version 3.11 --generate-hashes \
            --no-annotate -o requirements/ci.txt requirements/ci.in
          git diff --exit-code -- requirements/ci.txt

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install hash-locked CI environment
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-build-isolation --no-deps -e .
      - name: Lint and format
        run: |
          python -m ruff check src tests tools
          python -m ruff format --check src tests tools
      - name: Type-check (mypy strict)
        run: python -m mypy
      - name: Public-repository sanitation
        run: |
          python tools/check_function_docs.py
          python tools/check_public_repo.py
          python tools/validate_support_matrix.py
      - name: Solidity lint
        run: npx --yes solhint@6.2.3 --disc --noPoster --max-warnings 0 "onchain/src/**/*.sol"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install hash-locked CI environment
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-build-isolation --no-deps -e .
      - name: Offline tests
        run: python -m pytest -q --cov --cov-fail-under=90
      - name: Installed dependency consistency
        run: python -m pip check

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install and audit exact dependency artifacts
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip check
          python -m pip_audit --strict --require-hashes -r requirements/ci.txt
      - name: Build and validate distributions
        run: |
          python -m build --no-isolation
          python -m twine check dist/*
          python -m pip download --require-hashes -r requirements/ci.txt --dest wheelhouse
      - name: Clean core wheel smoke test
        run: |
          python -m venv .smoke/core
          .smoke/core/bin/pip install --no-index --find-links dist "psv[core]"
          .smoke/core/bin/pip check
          .smoke/core/bin/psv --help
          .smoke/core/bin/python -I -c "import psv; print(psv.__version__)"
          .smoke/core/bin/python -I -c "from importlib.resources import files; root = files('psv.schemas'); assert (root / 'run-record-v1.1.schema.json').is_file(); assert (root / 'reconciliation-report-v2.schema.json').is_file()"
      - name: Clean chain wheel smoke test
        run: |
          python -m venv .smoke/chain
          .smoke/chain/bin/pip install --no-index --find-links dist --find-links wheelhouse "psv[chain]"
          .smoke/chain/bin/pip check
          .smoke/chain/bin/python -I -c "import eth_account, web3; from psv.payloads import EvmSigner"
      - name: Clean SUT wheel smoke test
        run: |
          python -m venv .smoke/sut
          .smoke/sut/bin/pip install --no-index --find-links dist --find-links wheelhouse "psv[sut]"
          .smoke/sut/bin/pip check
          .smoke/sut/bin/python -I -c "import fastapi, httpx, uvicorn; from psv.reference_sut.server import ReferenceSut"

  onchain:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: Install hash-locked CI environment
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-build-isolation --no-deps -e .
      - name: Forge build, format and unit tests
        working-directory: onchain
        run: |
          forge fmt --check
          forge build
          forge test
      - name: Start Anvil
        run: |
          anvil --chain-id 84532 --silent &
          for _ in $(seq 1 40); do
            if cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 0.5
          done
          exit 1
      - name: Deploy UpgradeableMockUSDC
        working-directory: onchain
        run: |
          forge create src/UpgradeableMockUSDC.sol:UpgradeableMockUSDC \
            --rpc-url http://127.0.0.1:8545 \
            --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
            --broadcast
      - name: On-chain tests
        run: python -m pytest -q -m onchain

  rail-drift:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install hash-locked PSV
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-build-isolation --no-deps -e .
      - name: Calibrate reviewed Base mainnet rails (read-only)
        run: |
          psv rail-drift --rail usdc-base --rpc-url https://mainnet.base.org
          psv rail-drift --rail eurc-base --rpc-url https://mainnet.base.org
